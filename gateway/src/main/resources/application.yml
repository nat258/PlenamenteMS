server:
  port: 8090 
  forward-headers-strategy: framework

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webmvc:
          
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origin-patterns: "*"
                allowed-methods: "*"
                allowed-headers: "*"
                exposed-headers: "*"
                allow-credentials: false
                max-age: 3600

          
          routes:
            # AGENDAMIENTO
            - id: agendamiento-service
              uri: lb://MS-AGENDAMIENTO
              predicates:
                - Path=/api/v1/reservas/**, /api/v1/boletas/**, /agendamiento/api-docs/**

            # PACIENTES
            - id: pacientes-service
              uri: lb://MS-PACIENTES
              predicates:
                - Path=/api/v1/pacientes/**, /api/v1/diagnosticos/**, /api/v1/historiales/**, /api/v1/prevision/**, /pacientes/api-docs/**

            # PROFESIONALES
            - id: profesionales-service
              uri: lb://MS-PROFESIONALES
              predicates:
                - Path=/api/v1/psicologos/**, /api/v1/especialidades/**, /api/v1/comunas/**, /api/v1/regiones/**, /api/v1/sucursales/**, /profesionales/api-docs/**

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    urls:
      - name: Microservicio Agendamiento
        url: /agendamiento/api-docs
      - name: Microservicio Pacientes
        url: /pacientes/api-docs
      - name: Microservicio Profesionales
        url: /profesionales/api-docs
    disable-swagger-default-url: true
    display-request-duration: true
  api-docs:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true 